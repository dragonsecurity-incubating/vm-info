name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile
        run: make release VERSION=${{ github.ref_name }}

      - name: Package archives + checksums
        working-directory: dist
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in vm-info-*-*-*; do
            [ -f "$f" ] || continue
            case "$f" in
              *.tar.gz|*.zip) continue ;;
              *.exe) zip -q "${f%.exe}.zip" "$f" ;;
              *) tar -czf "$f.tar.gz" "$f" ;;
            esac
          done
          sha256sum *.tar.gz *.zip > SHA256SUMS
          ls -la

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: dist
        run: |
          set -euo pipefail
          shopt -s nullglob
          tag='${{ github.ref_name }}'
          assets=( *.tar.gz *.zip SHA256SUMS )
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              "${assets[@]}"
          fi
